name: Release to Homebrew Tap

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout claudux
        uses: actions/checkout@v4

      - name: Create GitHub Release with tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Wait for tarball to be available
        run: sleep 10

      - name: Compute SHA256 of release tarball
        id: sha
        run: |
          VERSION="${{ github.ref_name }}"
          TARBALL_URL="https://github.com/jqueguiner/claudux/archive/refs/tags/${VERSION}.tar.gz"
          SHA256=$(curl -sL "$TARBALL_URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tarball_url=${TARBALL_URL}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-claudux tap
        uses: actions/checkout@v4
        with:
          repository: jqueguiner/homebrew-claudux
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: homebrew-tap

      - name: Update Homebrew formula
        run: |
          VERSION="${{ steps.sha.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          TARBALL_URL="${{ steps.sha.outputs.tarball_url }}"

          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" homebrew-tap/Formula/claudux.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" homebrew-tap/Formula/claudux.rb

      - name: Push updated formula to tap
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claudux.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update claudux to ${{ steps.sha.outputs.version }}"
          git push
