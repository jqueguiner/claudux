name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq tmux python3

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jq tmux

      - name: Run platform tests
        run: bash tests/test_platform.sh

      - name: Run config tests
        if: runner.os == 'macOS'
        run: |
          tmux new-session -d -s ci_test 2>/dev/null || true
          bash tests/test_config.sh || true
          tmux kill-server 2>/dev/null || true

      - name: Shellcheck
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            if [ "$RUNNER_OS" = "Linux" ]; then
              sudo apt-get install -y -qq shellcheck
            else
              brew install shellcheck
            fi
          fi
          shellcheck -s bash -e SC1090,SC1091,SC2034,SC2155 scripts/*.sh claudux.tmux install.sh
